name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Verify sitemap generation
        run: |
          test -f docs/sitemap.xml
          test -f docs/robots.txt
          grep -q 'camp-scout-ai/campgrounds' docs/sitemap.xml
          grep -q 'Sitemap:' docs/robots.txt
